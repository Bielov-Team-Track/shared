syntax = "proto3";

option csharp_namespace = "Shared.Contracts.Grpc";

package clubs;

service ClubsInternalService {
  // Get members for notification purposes
  rpc GetClubMembers (GetClubMembersRequest) returns (GetClubMembersResponse);
  rpc GetGroupMembers (GetGroupMembersRequest) returns (GetGroupMembersResponse);
  rpc GetTeamMembers (GetTeamMembersRequest) returns (GetTeamMembersResponse);

  // For social-service: membership validation & suggestions
  rpc GetMembership (GetMembershipRequest) returns (GetMembershipResponse);
  rpc GetMemberSuggestions (GetMemberSuggestionsRequest) returns (GetMemberSuggestionsResponse);

  // Get club names by IDs
  rpc GetClubNames (GetClubNamesRequest) returns (GetClubNamesResponse);

  // For payments-service: check user's roles in a club
  rpc CheckUserClubRoles (CheckUserClubRolesRequest) returns (CheckUserClubRolesResponse);

  // For coaching-service: skill matrix data
  rpc GetSkillMatrix (GetSkillMatrixRequest) returns (GetSkillMatrixResponse);
}

// === Club Members ===

message GetClubMembersRequest {
  string club_id = 1;
  repeated string exclude_user_ids = 2;
}

message GetClubMembersResponse {
  repeated MemberInfo members = 1;
}

// === Group Members ===

message GetGroupMembersRequest {
  string group_id = 1;
  repeated string exclude_user_ids = 2;
}

message GetGroupMembersResponse {
  repeated MemberInfo members = 1;
}

// === Team Members ===

message GetTeamMembersRequest {
  string team_id = 1;
  repeated string exclude_user_ids = 2;
}

message GetTeamMembersResponse {
  repeated MemberInfo members = 1;
}

// === Membership Check ===

message GetMembershipRequest {
  string context_type = 1;  // Club, Group, Team
  string context_id = 2;
  string user_id = 3;
}

message GetMembershipResponse {
  bool is_member = 1;
  string role = 2;
  bool can_post = 3;
  bool can_comment = 4;
  bool can_view = 5;
}

// === Member Suggestions ===

message GetMemberSuggestionsRequest {
  string context_type = 1;
  string context_id = 2;
  string query = 3;
  int32 limit = 4;
}

message GetMemberSuggestionsResponse {
  repeated MemberSuggestion suggestions = 1;
}

// === Club Names ===

message GetClubNamesRequest {
  repeated string club_ids = 1;
}

message GetClubNamesResponse {
  repeated ClubNameInfo clubs = 1;
}

message ClubNameInfo {
  string club_id = 1;
  string name = 2;
  string logo_url = 3;
}

// === Common Messages ===

message MemberInfo {
  string user_id = 1;
  string display_name = 2;
  string role = 3;
}

message MemberSuggestion {
  string user_id = 1;
  string display_name = 2;
  string avatar_url = 3;
}

// === CheckUserClubRoles ===

message CheckUserClubRolesRequest {
  string user_id = 1;
  string club_id = 2;
}

message CheckUserClubRolesResponse {
  bool is_member = 1;
  repeated string roles = 2;  // Owner, Admin, Treasurer, HeadCoach, Coach, Member
}

// === Skill Matrix ===

message GetSkillMatrixRequest {
  string club_id = 1;
}

message GetSkillMatrixResponse {
  bool found = 1;
  string matrix_id = 2;
  repeated MatrixSkillProto skills = 3;
}

message MatrixSkillProto {
  string skill_id = 1;
  string name = 2;
  string skill_key = 3;
  repeated SkillBandProto bands = 4;
}

message SkillBandProto {
  string id = 1;
  int32 order = 2;
  string label = 3;
  double min_score = 4;
  double max_score = 5;
}
